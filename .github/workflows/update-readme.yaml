name: Update Readme
on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'
jobs:
  stats:
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - uses: actions/checkout@v6
      
      - name: Generate stats card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: theme=radical&hide_border=true&include_all_commits=true&count_private=false&show_icons=true
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Generate top languages card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: theme=radical&hide_border=true&include_all_commits=true&count_private=true&layout=compact&langs_count=10
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate wakatime card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: wakatime
          options: theme=radical&hide_border=true&show_icons=true&layout=compact&langs_count=10
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate streak stats card
        uses: DenverCoder1/github-readme-streak-stats@main
        with:
          options: user=${{ github.repository_owner }}&theme=radical&disable_animations=true&hide_border=true&mode=weekly
          path: profile/streak.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate trophy card
        uses: soulteary/github-profile-trophy-action@v1.0.0
        with:
          options: username=${{ github.repository_owner }}&theme=radical&column=4&margin-w=15&margin-h=15&no-frame=true
          path: profile/trophy.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate pin card for live-torrent-backend repo
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: pin
          options: show_owner=true&theme=radical&hide_border=true&username=Davenchy&description_lines_count=2&repo=live-torrent-backend
          path: profile/repos/live-torrent-backend-pin.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate pin card for media-share repo
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: pin
          options: show_owner=true&theme=radical&hide_border=true&username=Davenchy&description_lines_count=2&repo=media-share
          path: profile/repos/media-share-pin.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate pin card for clayout repo
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: pin
          options: show_owner=true&theme=radical&hide_border=true&username=Davenchy&description_lines_count=2&repo=clayout
          path: profile/repos/clayout-pin.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate pin card for brainfuck_compiler.rs repo
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: pin
          options: show_owner=true&theme=radical&hide_border=true&username=Davenchy&description_lines_count=2&repo=brainfuck_compiler.rs
          path: profile/repos/brainfuck_compiler.rs-pin.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate pin card for qemu-arm-machine repo
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: pin
          options: show_owner=true&theme=radical&hide_border=true&username=Davenchy&description_lines_count=2&repo=qemu-arm-machine
          path: profile/repos/qemu-arm-machine-pin.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate pin card for rusty_battleship repo
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: pin
          options: show_owner=true&theme=radical&hide_border=true&username=Davenchy&description_lines_count=2&repo=rusty_battleship
          path: profile/repos/rusty_battleship-pin.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate pin card for service_generator repo
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: pin
          options: show_owner=true&theme=radical&hide_border=true&username=Davenchy&description_lines_count=1&repo=service_generator
          path: profile/repos/service_generator-pin.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate pin card for pc-remote repo
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: pin
          options: show_owner=true&theme=radical&hide_border=true&username=Davenchy&description_lines_count=1&repo=pc-remote
          path: profile/repos/pc-remote-pin.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate pin card for hotclip repo
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: pin
          options: show_owner=true&theme=radical&hide_border=true&username=Davenchy&description_lines_count=3&repo=hotclip
          path: profile/repos/hotclip-pin.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate pin card for timer_sh repo
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: pin
          options: show_owner=true&theme=radical&hide_border=true&username=Davenchy&description_lines_count=3&repo=timer_sh
          path: profile/repos/timer_sh-pin.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "davenchy-bot@users.noreply.github.com"
          git add profile/**/*.svg
          git commit -m "Update README cards [WORKFLOW_ACTION]" || exit 0
          git push
